baseURL = "https://yudiwdynto.github.io/"
DefaultContentLanguage = "en"
languageCode = "en-us"
title = "Yudi Widiyanto"
copyright = "2022 Yudi Widiyanto"
# googleAnalytics = ""

[module]
  [[module.imports]]
    path = "github.com/yudiwdynto/hugo-theme-akasia"

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = false
    hl_Lines = ""
    lineNoStart = 1
    lineNos = false
    lineNumbersInTable = true
    noClasses = true
    style = "perldoc"
    tabWidth = 4

[params]
subtitle = "random"
# enableGitalk = true

# Twitter Card and Open Graph settings
enableOpenGraph = true
enableTwitterCards = true
title = "My Blog"
description = "My HomePage Description"

[taxonomies]
   tag = "tags"
   category = "categories"

[[menu.main]]
url = "/posts"
name = "Archive"
weight = 1

[[menu.main]]
url = "/index.xml"
name = "RSS Feed"
weight = 2
